<style>
  :root {
    --bg:#FBF2E4; --panel:#FFFFFF; --border:#E8D4B8; --border-light:#DCC0A0;
    --text:#2B1710; --muted:#8A6B4E; --muted2:#A5876A;
    --teal:#E8730B; --teal-dark:#C2600A; --teal-bg:rgba(232,115,11,0.10);
    --amber:#D9970F; --amber-dark:#A6740B; --amber-bg:rgba(217,151,15,0.12);
    --red:#D6362A; --red-dark:#A82A1F; --red-bg:rgba(214,54,42,0.09);
    --blue:#B33A2A; --blue-dark:#8C2F1E; --blue-bg:rgba(179,58,42,0.09);
  }
  * { box-sizing: border-box; }
  #rev-root { background:var(--bg); color:var(--text); font-family:ui-sans-serif,system-ui,sans-serif; min-height:100vh; padding:32px 24px; }
  .wrap { max-width:1150px; margin:0 auto; }
  .header { display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid var(--border); padding-bottom:20px; margin-bottom:24px; gap:16px; flex-wrap:wrap; }
  .brand { color:var(--teal); font-size:11px; letter-spacing:0.2em; text-transform:uppercase; font-family:ui-monospace,monospace; margin-bottom:4px; font-weight:700; }
  h1 { font-size:24px; font-weight:800; margin:0 0 4px; color:#20120B; }
  .sub { font-size:13px; color:var(--muted); margin:0; max-width:600px; }
  .badge { padding:8px 14px; border-radius:6px; font-size:13px; white-space:nowrap; border:1px solid var(--border); background:var(--panel); }
  .badge.bad { border-color:var(--red-dark); background:var(--red-bg); color:var(--red); }
  .badge.good { border-color:var(--teal-dark); background:var(--teal-bg); color:var(--teal); }
  .panel { border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:20px; background:var(--panel); box-shadow:0 1px 2px rgba(43,23,16,0.04); }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
  @media (max-width:820px){ .grid3{ grid-template-columns:1fr; } }
  .label { font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); display:block; margin-bottom:6px; font-weight:600; }
  input[type=text], input[type=password], select, textarea {
    width:100%; background:#FFFCF6; border:1px solid var(--border-light); border-radius:5px; color:var(--text);
    padding:8px 10px; font-size:13px; font-family:inherit;
  }
  input[type=text]:focus, input[type=password]:focus, textarea:focus { outline:none; border-color:var(--teal); }
  .dropzone { display:flex; align-items:center; gap:8px; border:1.5px dashed var(--border-light); border-radius:6px;
    padding:12px; font-size:13px; color:var(--muted); cursor:pointer; margin:10px 0; background:#FFFCF6; }
  .dropzone:hover { border-color:var(--teal); color:var(--teal-dark); }
  .dropzone input { display:none; }
  .filepill { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--teal-dark); margin-bottom:8px; font-weight:600; }
  .filepill button { margin-left:auto; background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px; }
  button.primary { background:var(--teal); border:none; color:#FFFDF9; font-weight:700; font-size:13px;
    border-radius:6px; padding:10px 18px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
    box-shadow:0 1px 3px rgba(232,115,11,0.35); }
  button.primary:disabled { opacity:0.5; cursor:default; }
  button.primary:hover:not(:disabled) { background:#F2811A; }
  button.secondary { background:var(--blue-bg); border:1px solid var(--blue-dark); color:var(--blue-dark); font-weight:700;
    font-size:13px; border-radius:6px; padding:10px 18px; cursor:pointer; display:flex; align-items:center; gap:8px; }
  button.secondary:hover:not(:disabled) { background:var(--blue-dark); color:#FFFDF9; }
  button.secondary:disabled { opacity:0.5; }
  button.ghost { background:var(--panel); border:1px solid var(--border-light); color:var(--muted); font-size:12px;
    border-radius:6px; padding:8px 14px; cursor:pointer; font-weight:600; }
  button.ghost:hover { color:var(--teal-dark); border-color:var(--teal); }
  button.danger-ghost { background:none; border:none; color:var(--muted); font-size:12px; cursor:pointer; }
  button.danger-ghost:hover { color:var(--red); }
  .spin { display:inline-block; width:13px; height:13px; border:2px solid currentColor; border-right-color:transparent;
    border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .progress-log { font-size:11px; color:var(--muted); margin-top:8px; font-family:ui-monospace,monospace; line-height:1.6; max-height:100px; overflow-y:auto; background:#FFFCF6; border-radius:4px; padding:6px 8px; }
  .error-msg { color:var(--red); font-size:13px; margin-top:8px; font-weight:600; }
  .seg-card { border:1px solid var(--border); border-radius:10px; margin-bottom:14px; overflow:hidden; background:var(--panel); }
  .seg-head { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:#FDEEDC; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:8px; }
  .seg-name { font-weight:700; font-size:14px; color:#20120B; }
  .seg-rev { font-size:12px; color:var(--muted); }
  .pill { font-size:11px; padding:2px 8px; border-radius:4px; border:1px solid; white-space:nowrap; display:inline-flex; align-items:center; gap:4px; font-weight:700; }
  .pill.exact { color:var(--teal-dark); border-color:var(--teal-dark); background:var(--teal-bg); }
  .pill.est { color:var(--amber-dark); border-color:var(--amber-dark); background:var(--amber-bg); }
  .pill.warn { color:var(--red); border-color:var(--red-dark); background:var(--red-bg); }
  .seg-body { padding:12px 16px; }
  .seg-desc { font-size:12px; color:var(--muted); margin-bottom:10px; line-height:1.5; }
  .alloc-row { display:grid; grid-template-columns:90px 1fr 70px 24px; gap:8px; align-items:center; margin-bottom:6px; }
  .alloc-row input[type=text] { font-size:12px; padding:6px 8px; }
  .alloc-row input[type=number] { width:100%; background:#FFFCF6; border:1px solid var(--border-light); border-radius:5px; color:var(--text); padding:6px 8px; font-size:12px; }
  .alloc-remove { background:none; border:none; color:var(--muted); cursor:pointer; font-size:14px; }
  .alloc-sum { font-size:11px; margin-top:4px; font-weight:600; }
  .alloc-sum.ok { color:var(--teal-dark); } .alloc-sum.bad { color:var(--red); }
  .add-alloc { font-size:11px; color:var(--blue-dark); background:none; border:none; cursor:pointer; margin-top:4px; font-weight:600; }
  .quote { font-size:11px; color:var(--muted2); font-style:italic; margin-top:8px; }
  .footnote { font-size:11px; color:var(--muted2); margin-top:14px; line-height:1.6; }
  .recon-panel { display:flex; gap:24px; flex-wrap:wrap; font-size:13px; }
  .recon-item .label { margin-bottom:2px; }
  .company-card { border:1px solid var(--border); border-radius:10px; margin-bottom:20px; overflow:hidden; background:var(--panel); box-shadow:0 1px 3px rgba(43,23,16,0.05); }
  .company-head { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; background:#FDEEDC; border-bottom:1px solid var(--border); }
  .company-title { font-weight:700; font-size:14px; display:flex; align-items:center; gap:8px; color:#20120B; }
  .company-status { font-size:11px; padding:2px 8px; border-radius:4px; border:1px solid var(--border-light); color:var(--muted); font-weight:700; }
  .company-status.done { color:var(--teal-dark); border-color:var(--teal-dark); background:var(--teal-bg); }
  .company-status.error { color:var(--red); border-color:var(--red-dark); background:var(--red-bg); }
  .company-body { padding:16px; }
  .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; align-items:center; }
</style>

<div id="rev-root">
  <div class="wrap">
    <div class="header">
      <div>
        <div class="brand">💵 REVENUE LEDGER 001 — FREE, MULTI-COMPANY</div>
        <h1>Segment Revenue &amp; NAICS Mapping — batch mode</h1>
        <p class="sub">Add one card per company, upload each 10-K / annual report, then process all and export everything — segments, revenue, and NAICS allocations — into a single Excel workbook.</p>
      </div>
      <div id="globalBadge"></div>
    </div>

    <div class="panel" id="apiKeyPanel"></div>

    <div class="toolbar">
      <button class="primary" id="addCompanyBtn" style="width:auto;">+ Add company</button>
      <button class="secondary" id="processAllBtn" style="width:auto;">▶ Process all pending</button>
      <button class="ghost" id="exportBtn">⬇ Export all to Excel</button>
    </div>
    <div id="errorBox" class="error-msg"></div>

    <div id="companiesList"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
(function () {
  window.addEventListener("error", (e) => {
    console.error("Uncaught error:", e.error || e.message);
    const box = document.getElementById("errorBox");
    if (box) box.textContent = "Something went wrong: " + (e.error && e.error.message ? e.error.message : e.message) + " — check the browser console for details.";
  });
  window.addEventListener("unhandledrejection", (e) => {
    console.error("Unhandled rejection:", e.reason);
    const box = document.getElementById("errorBox");
    if (box) box.textContent = "Something went wrong: " + (e.reason && e.reason.message ? e.reason.message : e.reason);
  });

  if (typeof pdfjsLib === "undefined") {
    document.getElementById("rev-root").innerHTML =
      '<div style="padding:40px;text-align:center;color:#D6362A;">PDF library failed to load from the CDN — check your network connection or ad-blocker, then reload the tool.</div>';
    return;
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  const KEYWORDS = /segment|reportable segment|operating segment|net (sales|revenue)|business unit|naics|revenue by segment|disaggregat/i;
  const DEFAULT_MODEL = "meta-llama/llama-4-maverick:free"; // check openrouter.ai/models (filter: Free + Vision) if this stops working

  let idCounter = 1;
  let state = { companies: [] };

  function el(id){ return document.getElementById(id); }
  function newCompany() {
    return { id: idCounter++, name:"", year:"", file:null, log:[], loading:false, mapping:false, extraction:null, mapped:null, error:null };
  }

  function extractJson(text) {
    const cleaned = text.replace(/```json|```/g, "");
    const match = cleaned.match(/\{[\s\S]*\}/);
    if (!match) throw new Error("No JSON object found in model response: " + cleaned.slice(0,120));
    return JSON.parse(match[0]);
  }

  async function callClaude(system, content) {
    const apiKey = localStorage.getItem("openrouter_api_key");
    if (!apiKey) throw new Error("Enter your OpenRouter API key above first (free at openrouter.ai/keys).");
    const model = localStorage.getItem("openrouter_model") || DEFAULT_MODEL;
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method:"POST",
      headers: {
        "Content-Type":"application/json",
        "Authorization": "Bearer " + apiKey,
        "HTTP-Referer": location.href,
        "X-Title": "Segment Revenue NAICS Mapper"
      },
      body: JSON.stringify({
        model,
        max_tokens: 1000,
        messages: [
          { role:"system", content: system },
          { role:"user", content }
        ]
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error("API error: " + (data.error && data.error.message ? data.error.message : res.status));
    const text = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || "";
    return extractJson(text);
  }

  async function callClaudeWithRetry(system, content, maxRetries) {
    maxRetries = maxRetries == null ? 2 : maxRetries;
    let lastErr;
    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      try { return await callClaude(system, content); }
      catch (e) { lastErr = e; if (attempt < maxRetries) await new Promise(r => setTimeout(r, 700 * (attempt + 1))); }
    }
    throw lastErr;
  }

  function fallbackMapping(reason) {
    return { tier:"unmapped_needs_review", rationale:"Automatic mapping failed" + (reason ? (": " + reason) : "") + " — use Retry or classify manually.", allocations:[] };
  }

  function normalizeName(s) { return (s||"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim(); }

  function findMapping(company, segName) {
    if (!company.mapped) return null;
    const key = normalizeName(segName);
    if (company.mapped[key]) return company.mapped[key];
    for (const k in company.mapped) if (k && (k.includes(key) || key.includes(k))) return company.mapped[k];
    return null;
  }

  const EXTRACTION_SYSTEM = `You are a financial disclosure extraction specialist. You are shown selected page images from a company's annual report / 10-K (each preceded by its page number).
RULES:
1. Extract the company's total enterprise revenue if stated, and every reportable/operating segment with its revenue and a business description drawn from the text (what products/services/industries it covers).
2. disclosure_type per segment: "exact" if the segment revenue is a clean, directly stated number for a single coherent business line; "aggregated" if the segment bundles multiple distinct business lines/products into one number; "not_disclosed" if a segment is named but no revenue figure is given in these pages.
3. Never invent numbers. If a figure is not explicitly present, use null and note it in data_gaps.
4. Include source_quote (verbatim, <15 words) or source_location like "segment table, page 44" for every figure.
5. Your entire response must be a single JSON object and nothing else. First character {, last character }. No preamble, no commentary, no markdown fences.
{
 "company_total_revenue": {"value": number|null, "currency": string|null, "source_quote": string|null},
 "segments": [{"segment_name": string, "segment_description": string, "revenue_value": number|null, "currency": string|null, "disclosure_type": "exact|aggregated|not_disclosed", "source_quote": string|null}],
 "data_gaps": [string]
}`;

  const MAPPING_SYSTEM = `You are an industry classification specialist mapping business segments to NAICS codes (2022 NAICS US structure), using your knowledge of NAICS since no external code list is provided.
RULES:
1. For each segment given, if its description clearly represents a single coherent business line, assign one NAICS code at 100%, tier "1_exact".
2. If the segment description spans multiple distinct product/service lines or industries, propose 2-4 NAICS codes with percentage allocations that sum to 100, based on the relative emphasis/wording in the description. Tier "2_estimated_clear" if the description gives enough detail to allocate with reasonable confidence, "3_estimated_limited" if the description is vague.
3. Use the most specific NAICS code level you can justify (6-digit preferred, fall back to broader level if description is too generic).
4. rationale: one short sentence explaining the allocation logic.
5. Your entire response must be a single JSON object and nothing else. First character {, last character }. No preamble, no commentary, no markdown fences.
{"segment_mappings": [{"segment_name": string, "tier": "1_exact|2_estimated_clear|3_estimated_limited", "rationale": string, "allocations": [{"naics_code": string, "naics_title": string, "percent": number}]}]}`;

  function log(company, msg) { company.log.push(msg); renderAll(); }

  async function scanAndSelectPages(pdf, maxPages) {
    const total = pdf.numPages;
    const scored = [];
    for (let i = 1; i <= total; i++) {
      const page = await pdf.getPage(i);
      const tc = await page.getTextContent();
      const pageText = tc.items.map(it => it.str).join(" ");
      const matches = pageText.match(KEYWORDS);
      scored.push({ page: i, score: matches ? matches.length : 0 });
    }
    let selected = scored.filter(s => s.score > 0).sort((a,b) => a.page - b.page);
    if (selected.length === 0) {
      const step = Math.max(1, Math.floor(total / 15));
      selected = [];
      for (let i = 1; i <= total; i += step) selected.push({ page:i, score:0 });
    }
    if (selected.length > maxPages) selected = selected.sort((a,b) => b.score - a.score).slice(0, maxPages).sort((a,b) => a.page - b.page);
    return { total, selected: selected.map(s => s.page) };
  }

  async function renderPageToBase64(pdf, pageNum, scale) {
    const page = await pdf.getPage(pageNum);
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement("canvas");
    canvas.width = viewport.width; canvas.height = viewport.height;
    const ctx = canvas.getContext("2d");
    await page.render({ canvasContext: ctx, viewport }).promise;
    return canvas.toDataURL("image/png").split(",")[1];
  }

  function mergeExtractions(a, b) {
    if (!a) return b; if (!b) return a;
    const totalRev = (a.company_total_revenue && a.company_total_revenue.value != null) ? a.company_total_revenue : b.company_total_revenue;
    const segMap = new Map();
    for (const s of [...(a.segments||[]), ...(b.segments||[])]) {
      const key = normalizeName(s.segment_name);
      const existing = segMap.get(key);
      if (!existing || (existing.revenue_value == null && s.revenue_value != null)) segMap.set(key, s);
    }
    return {
      company_total_revenue: totalRev,
      segments: Array.from(segMap.values()),
      data_gaps: [...(a.data_gaps||[]), ...(b.data_gaps||[])].filter((v,i,arr)=>arr.indexOf(v)===i)
    };
  }

  async function extractCompany(company) {
    if (!company.file) { company.error = "Upload a PDF first."; renderAll(); return; }
    company.loading = true; company.log = []; company.error = null; company.extraction = null; company.mapped = null;
    renderAll();
    try {
      log(company, "Loading PDF...");
      const buf = await company.file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
      log(company, `Loaded ${pdf.numPages} pages. Scanning for segment/revenue content...`);
      const { total, selected } = await scanAndSelectPages(pdf, 24);
      log(company, `Found ${selected.length} relevant page(s) out of ${total}: ${selected.join(", ")}`);

      const batchSize = 6;
      let merged = null;
      for (let i = 0; i < selected.length; i += batchSize) {
        const batchPages = selected.slice(i, i + batchSize);
        log(company, `Reading batch ${Math.floor(i/batchSize)+1} (pages ${batchPages.join(", ")})...`);
        const content = [];
        for (const p of batchPages) {
          const b64 = await renderPageToBase64(pdf, p, 1.4);
          content.push({ type:"text", text:`Page ${p}:` });
          content.push({ type:"image_url", image_url:{ url: "data:image/png;base64," + b64 } });
        }
        content.push({ type:"text", text:`Company: ${company.name||"Unknown"}\nFiscal year: ${company.year||"Unknown"}\nExtract total revenue and all segments per the schema from the pages shown above.` });
        try {
          const partial = await callClaudeWithRetry(EXTRACTION_SYSTEM, content, 2);
          merged = mergeExtractions(merged, partial);
        } catch (batchErr) {
          log(company, `⚠ Batch ${Math.floor(i/batchSize)+1} failed to parse (${batchErr.message}) — skipping.`);
        }
      }
      if (!merged) throw new Error("All batches failed — no data could be extracted.");
      company.extraction = merged;
      log(company, `Done. Found ${merged.segments.length} segment(s).`);
      await mapCompany(company);
    } catch (e) {
      company.error = "Extraction failed: " + (e.message || e);
    } finally {
      company.loading = false;
      renderAll();
    }
  }

  async function mapCompany(company) {
    if (!company.extraction || !company.extraction.segments.length) return;
    company.mapping = true; company.mapped = company.mapped || {};
    renderAll();
    const segs = company.extraction.segments;
    const chunkSize = 3;
    for (let i = 0; i < segs.length; i += chunkSize) {
      const chunk = segs.slice(i, i + chunkSize);
      try {
        const content = [{ type:"text", text: `Segments to classify:\n${JSON.stringify(chunk.map(s => ({segment_name:s.segment_name, segment_description:s.segment_description})))}` }];
        const result = await callClaudeWithRetry(MAPPING_SYSTEM, content, 2);
        if (!result || !Array.isArray(result.segment_mappings)) throw new Error("malformed response shape");
        for (const m of result.segment_mappings) if (m && m.segment_name) company.mapped[normalizeName(m.segment_name)] = m;
        for (const s of chunk) if (!findMapping(company, s.segment_name)) company.mapped[normalizeName(s.segment_name)] = fallbackMapping("segment missing from response");
      } catch (e) {
        for (const s of chunk) company.mapped[normalizeName(s.segment_name)] = fallbackMapping(e.message || String(e));
      }
      renderAll();
    }
    company.mapping = false;
    renderAll();
  }

  async function retrySegmentMapping(company, segIndex) {
    const s = company.extraction.segments[segIndex];
    company.mapped[normalizeName(s.segment_name)] = { tier:"pending", rationale:"Retrying...", allocations:[] };
    renderAll();
    try {
      const content = [{ type:"text", text: `Segment to classify:\n${JSON.stringify({segment_name:s.segment_name, segment_description:s.segment_description})}` }];
      const result = await callClaudeWithRetry(MAPPING_SYSTEM, content, 2);
      const m = result && Array.isArray(result.segment_mappings) ? result.segment_mappings[0] : null;
      company.mapped[normalizeName(s.segment_name)] = m || fallbackMapping("still no valid response");
    } catch (e) {
      company.mapped[normalizeName(s.segment_name)] = fallbackMapping(e.message || String(e));
    }
    renderAll();
  }

  async function processAll() {
    for (const company of state.companies) {
      if (company.file && !company.extraction && !company.loading) {
        await extractCompany(company);
        await new Promise(r => setTimeout(r, 1200)); // small gap between companies, free-tier rate limits are shared
      }
    }
  }

  function exportToExcel() {
    if (typeof XLSX === "undefined") {
      el("errorBox").textContent = "Excel export library failed to load from the CDN — check your network connection and reload.";
      return;
    }
    const done = state.companies.filter(c => c.extraction);
    if (done.length === 0) {
      el("errorBox").textContent = "No extracted data yet — process at least one company first.";
      return;
    }
    const segmentRows = [];
    const summaryRows = [];
    for (const c of done) {
      const total = c.extraction.company_total_revenue;
      const segSum = c.extraction.segments.reduce((s,x) => s + (x.revenue_value || 0), 0);
      const diffPct = (total && total.value) ? Math.abs(segSum - total.value) / total.value * 100 : null;
      summaryRows.push({
        Company: c.name || "(unnamed)",
        "Fiscal Year": c.year || "",
        "Total Revenue": total ? total.value : null,
        Currency: total ? total.currency : "",
        "Sum of Segments": segSum,
        "Reconciliation Diff %": diffPct != null ? Math.round(diffPct*10)/10 : "n/a",
        "Data Gaps": (c.extraction.data_gaps||[]).join("; ")
      });
      for (const s of c.extraction.segments) {
        const m = findMapping(c, s.segment_name);
        const allocations = (m && Array.isArray(m.allocations) && m.allocations.length) ? m.allocations : [{naics_code:"", naics_title:"", percent:""}];
        for (const a of allocations) {
          segmentRows.push({
            Company: c.name || "(unnamed)",
            "Fiscal Year": c.year || "",
            Segment: s.segment_name,
            Description: s.segment_description || "",
            Revenue: s.revenue_value,
            Currency: s.currency || "",
            "Disclosure Type": s.disclosure_type,
            "NAICS Code": a.naics_code || "",
            "NAICS Title": a.naics_title || "",
            "Allocation %": a.percent != null ? a.percent : "",
            Tier: m ? m.tier : "not_mapped",
            Rationale: m ? m.rationale : "",
            "Source Quote": s.source_quote || ""
          });
        }
      }
    }
    const wb = XLSX.utils.book_new();
    const wsSummary = XLSX.utils.json_to_sheet(summaryRows);
    const wsSegments = XLSX.utils.json_to_sheet(segmentRows);
    XLSX.utils.book_append_sheet(wb, wsSummary, "Company Summary");
    XLSX.utils.book_append_sheet(wb, wsSegments, "Segments & NAICS");
    XLSX.writeFile(wb, "segment-revenue-naics-export.xlsx");
  }

  function renderApiKeyPanel() {
    const p = el("apiKeyPanel");
    const saved = localStorage.getItem("openrouter_api_key");
    const savedModel = localStorage.getItem("openrouter_model") || DEFAULT_MODEL;
    p.innerHTML = `
      <div class="label">Your OpenRouter API key</div>
      <p style="font-size:12px;color:var(--muted);margin:0 0 10px;">
        Stored only in this browser (localStorage) — never sent anywhere except directly to OpenRouter when you run an extraction.
        Get a free key at <a href="https://openrouter.ai/keys" target="_blank" style="color:var(--teal);">openrouter.ai/keys</a> (no credit card needed).
        Free-tier models are rate-limited (~20 requests/minute, capped daily) but genuinely $0.
      </p>
      <div style="display:flex; gap:8px; margin-bottom:8px;">
        <input type="password" id="apiKeyIn" placeholder="sk-or-v1-..." value="${saved ? saved : ""}" style="flex:1;" />
        <button class="primary" id="saveKeyBtn" style="width:auto; padding:8px 16px;">Save</button>
        ${saved ? `<button class="add-alloc" id="clearKeyBtn" style="white-space:nowrap;">Clear</button>` : ""}
      </div>
      <div class="label" style="margin-top:10px;">Free vision model ID</div>
      <p style="font-size:11px;color:var(--muted2);margin:0 0 6px;">
        Free model IDs rotate. If extraction stops working, check
        <a href="https://openrouter.ai/models" target="_blank" style="color:var(--teal);">openrouter.ai/models</a>
        (filter: Free + Vision/Multimodal) and paste a current one here.
      </p>
      <input type="text" id="modelIdIn" value="${savedModel}" />
      ${saved ? `<div style="font-size:11px;color:var(--teal);margin-top:6px;">✓ Key saved in this browser</div>` : ""}
    `;
    el("saveKeyBtn").addEventListener("click", () => {
      const val = el("apiKeyIn").value.trim();
      const modelVal = el("modelIdIn").value.trim();
      if (val) localStorage.setItem("openrouter_api_key", val);
      if (modelVal) localStorage.setItem("openrouter_model", modelVal);
      renderApiKeyPanel();
    });
    el("modelIdIn").addEventListener("change", (e) => localStorage.setItem("openrouter_model", e.target.value.trim()));
    const clearBtn = el("clearKeyBtn");
    if (clearBtn) clearBtn.addEventListener("click", () => { localStorage.removeItem("openrouter_api_key"); renderApiKeyPanel(); });
  }

  function segmentCardHtml(company, s, si) {
    const m = findMapping(company, s.segment_name);
    let tierClass = "", tierLabel = "Not mapped";
    if (m) {
      if (m.tier === "1_exact") { tierClass = "exact"; tierLabel = "Exact"; }
      else if (m.tier === "unmapped_needs_review") { tierClass = "warn"; tierLabel = "Needs manual review"; }
      else if (m.tier === "pending") { tierClass = "est"; tierLabel = "Retrying..."; }
      else { tierClass = "est"; tierLabel = ({ "2_estimated_clear":"Estimated (clear)", "3_estimated_limited":"Estimated (limited)" }[m.tier] || m.tier); }
    }
    const allocations = (m && Array.isArray(m.allocations)) ? m.allocations : [];
    const sumPct = allocations.reduce((a,x)=>a+(x.percent||0),0);
    const needsRetry = m && m.tier === "unmapped_needs_review";
    return `
      <div class="seg-card" data-cid="${company.id}" data-si="${si}">
        <div class="seg-head">
          <div>
            <div class="seg-name">${s.segment_name}</div>
            <div class="seg-rev">${s.revenue_value != null ? s.revenue_value.toLocaleString() + " " + (s.currency||"") : "revenue not disclosed"}</div>
          </div>
          <span class="pill ${tierClass}">${tierLabel}</span>
        </div>
        <div class="seg-body">
          <div class="seg-desc">${s.segment_description||""}</div>
          <div class="label">NAICS allocation</div>
          <div class="alloc-list">
            ${allocations.map((a) => `
              <div class="alloc-row">
                <input type="text" class="code-in" value="${a.naics_code}" placeholder="code" />
                <input type="text" class="title-in" value="${a.naics_title}" placeholder="NAICS title" />
                <input type="number" class="pct-in" value="${a.percent}" min="0" max="100" />
                <button class="alloc-remove">✕</button>
              </div>`).join("")}
          </div>
          <div class="alloc-sum ${Math.round(sumPct)===100?"ok":"bad"}" data-sum>${allocations.length ? `Sum: ${sumPct}%` : ""}</div>
          <button class="add-alloc" data-add>+ add NAICS code</button>
          ${needsRetry ? `<button class="add-alloc" data-retry style="color:#A6740B;">↻ Retry mapping</button>` : ""}
          ${m ? `<div class="quote">${m.rationale}</div>` : ""}
          ${s.source_quote ? `<div class="quote">Source: "${s.source_quote}"</div>` : ""}
        </div>
      </div>`;
  }

  function reconciliationHtml(company) {
    if (!company.extraction) return "";
    const total = company.extraction.company_total_revenue;
    const segSum = company.extraction.segments.reduce((s,x) => s + (x.revenue_value || 0), 0);
    const disclosedCount = company.extraction.segments.filter(x => x.revenue_value != null).length;
    if (!(total && total.value != null && disclosedCount > 0)) return "";
    const diffPct = Math.abs(segSum - total.value) / total.value * 100;
    const ok = diffPct < 3;
    return `<div class="panel recon-panel">
      <div class="recon-item"><div class="label">Total revenue</div><div>${total.value.toLocaleString()} ${total.currency||""}</div></div>
      <div class="recon-item"><div class="label">Sum of segments</div><div>${segSum.toLocaleString()} ${total.currency||""}</div></div>
      <div class="recon-item"><div class="label">Difference</div><div style="color:${ok?"var(--teal)":"var(--red)"};">${diffPct.toFixed(1)}%</div></div>
    </div>`;
  }

  function companyCardHtml(company) {
    const status = company.loading || company.mapping ? `<span class="company-status"><span class="spin"></span> ${company.loading?"extracting":"mapping"}</span>`
      : company.error ? `<span class="company-status error">error</span>`
      : company.extraction ? `<span class="company-status done">done — ${company.extraction.segments.length} segment(s)</span>`
      : `<span class="company-status">pending</span>`;
    return `
    <div class="company-card" data-cid="${company.id}">
      <div class="company-head">
        <div class="company-title">📁 ${company.name || "Untitled company"} ${status}</div>
        <button class="danger-ghost" data-remove-company>✕ remove</button>
      </div>
      <div class="company-body">
        <div class="grid3">
          <div><span class="label">Company</span><input type="text" class="name-in" value="${company.name}" placeholder="Company name" /></div>
          <div><span class="label">Fiscal year</span><input type="text" class="year-in" value="${company.year}" placeholder="Optional" /></div>
          <div style="display:flex; align-items:flex-end;">
            <button class="primary extract-btn" style="width:100%;" ${company.loading||company.mapping?"disabled":""}>
              ${company.loading||company.mapping ? `<span class="spin"></span> Processing...` : "Scan & extract"}
            </button>
          </div>
        </div>
        <label class="dropzone">
          📄 <span style="overflow:hidden;text-overflow:ellipsis;">${company.file ? company.file.name : "Upload 10-K / annual report PDF"}</span>
          <input type="file" accept="application/pdf" class="file-in" />
        </label>
        ${company.file ? `<div class="filepill">📎 ${company.file.name}<button class="remove-file">remove</button></div>` : ""}
        ${company.log.length ? `<div class="progress-log">${company.log.map(l=>"> "+l).join("<br>")}</div>` : ""}
        ${company.error ? `<div class="error-msg">${company.error}</div>` : ""}
        ${reconciliationHtml(company)}
        ${company.mapping ? `<div class="panel" style="text-align:center; color:var(--muted);"><span class="spin"></span> Mapping segments to NAICS codes...</div>` :
          (company.extraction ? company.extraction.segments.map((s,si) => segmentCardHtml(company, s, si)).join("") : "")}
      </div>
    </div>`;
  }

  function bindCompanyCard(cardEl, company) {
    cardEl.querySelector(".name-in").addEventListener("input", e => company.name = e.target.value);
    cardEl.querySelector(".year-in").addEventListener("input", e => company.year = e.target.value);
    cardEl.querySelector(".file-in").addEventListener("change", e => { const f = e.target.files[0]; if (f) { company.file = f; renderAll(); } });
    cardEl.querySelector(".extract-btn").addEventListener("click", () => extractCompany(company));
    cardEl.querySelector("[data-remove-company]").addEventListener("click", () => {
      state.companies = state.companies.filter(c => c.id !== company.id);
      renderAll();
    });
    const rmFile = cardEl.querySelector(".remove-file");
    if (rmFile) rmFile.addEventListener("click", () => { company.file = null; renderAll(); });

    cardEl.querySelectorAll(".seg-card").forEach(segCard => {
      const si = +segCard.dataset.si;
      const recalcSum = () => {
        const rows = segCard.querySelectorAll(".alloc-row");
        let sum = 0; rows.forEach(r => sum += (+r.querySelector(".pct-in").value || 0));
        const sumEl = segCard.querySelector("[data-sum]");
        sumEl.textContent = rows.length ? `Sum: ${sum}%` : "";
        sumEl.className = "alloc-sum " + (Math.round(sum) === 100 ? "ok" : "bad");
      };
      segCard.querySelectorAll(".pct-in, .code-in, .title-in").forEach(inp => inp.addEventListener("input", recalcSum));
      segCard.querySelectorAll(".alloc-remove").forEach(btn => btn.addEventListener("click", () => { btn.closest(".alloc-row").remove(); recalcSum(); }));
      const addBtn = segCard.querySelector("[data-add]");
      if (addBtn) addBtn.addEventListener("click", () => {
        const list = segCard.querySelector(".alloc-list");
        const row = document.createElement("div");
        row.className = "alloc-row";
        row.innerHTML = `<input type="text" class="code-in" placeholder="code" /><input type="text" class="title-in" placeholder="NAICS title" /><input type="number" class="pct-in" value="0" min="0" max="100" /><button class="alloc-remove">✕</button>`;
        list.appendChild(row);
        row.querySelectorAll(".pct-in, .code-in, .title-in").forEach(inp => inp.addEventListener("input", recalcSum));
        row.querySelector(".alloc-remove").addEventListener("click", () => { row.remove(); recalcSum(); });
      });
      const retryBtn = segCard.querySelector("[data-retry]");
      if (retryBtn) retryBtn.addEventListener("click", () => retrySegmentMapping(company, si));
    });
  }

  function renderAll() {
    try {
      const box = el("companiesList");
      box.innerHTML = state.companies.map(c => companyCardHtml(c)).join("");
      box.querySelectorAll(".company-card").forEach(cardEl => {
        const cid = +cardEl.dataset.cid;
        const company = state.companies.find(c => c.id === cid);
        if (company) bindCompanyCard(cardEl, company);
      });

      const doneCount = state.companies.filter(c => c.extraction).length;
      const totalCount = state.companies.length;
      el("globalBadge").innerHTML = totalCount ? `<div class="badge ${doneCount===totalCount && totalCount>0 ? "good":"bad"}">${doneCount}/${totalCount} companies processed</div>` : "";
    } catch (e) {
      console.error("Render error:", e);
      const box = el("errorBox");
      if (box) box.textContent = "Display error: " + (e.message || e) + " — try re-processing if the screen looks wrong.";
    }
  }

  el("addCompanyBtn").addEventListener("click", () => { state.companies.push(newCompany()); renderAll(); });
  el("processAllBtn").addEventListener("click", processAll);
  el("exportBtn").addEventListener("click", exportToExcel);

  state.companies.push(newCompany());
  renderApiKeyPanel();
  renderAll();
})();
</script>
